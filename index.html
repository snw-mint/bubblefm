  <body>
    <header class="home-header">
      <a href="index.html" class="logo-container">
        <img src="logo.webp" alt="BubbleFM Logo" class="logo-icon" />
        <span class="logo-text">
          <span class="brand-bubble">Bubble</span>
          <span class="brand-fm">FM</span>
        </span>
      </a>
      <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Alternar tema"></button>
        <a
          href="https://github.com/snw-mint/bubblefm"
          target="_blank"
          rel="noopener noreferrer"
          class="github-link-btn"
          aria-label="Repositório do GitHub">
          <svg width="800" height="800" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" data-name="Layer 1">
            <path
              d="M12 2.247a10 10 0 0 0-3.162 19.487c.5.088.687-.212.687-.475 0-.237-.012-1.025-.012-1.862-2.513.462-3.163-.613-3.363-1.175a3.64 3.64 0 0 0-1.025-1.413c-.35-.187-.85-.65-.013-.662a2 2 0 0 1 1.538 1.025 2.137 2.137 0 0 0 2.912.825 2.1 2.1 0 0 1 .638-1.338c-2.225-.25-4.55-1.112-4.55-4.937a3.9 3.9 0 0 1 1.025-2.688 3.6 3.6 0 0 1 .1-2.65s.837-.262 2.75 1.025a9.43 9.43 0 0 1 5 0c1.912-1.3 2.75-1.025 2.75-1.025a3.6 3.6 0 0 1 .1 2.65 3.87 3.87 0 0 1 1.025 2.688c0 3.837-2.338 4.687-4.562 4.937a2.37 2.37 0 0 1 .674 1.85c0 1.338-.012 2.413-.012 2.75 0 .263.187.575.687.475A10.005 10.005 0 0 0 12 2.247" />
          </svg>
        </a>
      </div>
    </header>

    <main class="main-container">
      <section class="landing-card">
        <h1 class="landing-title">Visualize your Last.fm scrobbles & minutes</h1>
        <p class="landing-subtitle">
          Enter your Last.fm username to generate aesthetic charts of your top artists, tracks, and total listening
          time.
        </p>

        <form id="form-username" class="username-form">
          <div class="input-group">
            <div class="input-with-icon">
              <span class="input-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  height="20px"
                  viewBox="0 -960 960 960"
                  width="20px"
                  fill="currentColor">
                  <path
                    d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480v58q0 59-40.5 100.5T740-280q-35 0-66-15t-52-43q-29 29-65.5 43.5T480-280q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480v58q0 26 17 44t43 18q26 0 43-18t17-44v-58q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93h160q17 0 28.5 11.5T680-120q0 17-11.5 28.5T640-80H480Zm85-315q35-35 35-85t-35-85q-35-35-85-35t-85 35q-35 35-35 85t35 85q35 35 85 35t85-35Z" />
                </svg>
              </span>
              <input type="text" id="userInput" placeholder="Last.fm username" autocomplete="off" required />
            </div>
            <button type="submit" id="btnIr" class="btn-primary">View Stats</button>
          </div>
        </form>

        <p class="signup-link">
          Don't have a Last.fm account?
          <a href="https://www.last.fm/join" target="_blank" rel="noopener noreferrer">Create one!</a>
        </p>

        <p id="mensagemErro" class="error-message"></p>
      </section>
    </main>

    <footer class="app-footer">
      <div class="footer-info">
        <span class="info-line-1">
          ©
          <span id="currentYear">2026</span>
          BubbleFM.
        </span>
