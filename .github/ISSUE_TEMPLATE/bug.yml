name: Bug Report
description: Report general errors, failures, or unexpected behavior.
title: "[Bug]: "
labels: ["bug", "triage", "needs-investigation"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting this bug. Please provide as much detail as possible to help us fix it."
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What is the problem?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
